# Agience Edge — local install (home.agience.ai → 127.0.0.1)
#
# Pulls :edge images built from every push to main.
# These builds may be unstable. Use for testing and early feedback.
#
# Self-contained — no .env file, no external config files required.
# The init container generates all credentials on first boot.
#
# Install:   curl -fsSL https://get.agience.ai/edge/install.sh | sh
# Start:     agience-edge up
# Open:      https://home.agience.ai
# Update:    agience-edge update
#
# Only one Agience stack (home or edge) can run at a time — both use
# ports 80/443 at home.agience.ai. Run `agience down` or `agience-edge down`
# before switching.

name: agience-edge

services:

  # ── Init — generates all key material on first boot ──────────────────
  # Idempotent: skips if .data/.initialized exists.

  init:
    image: ${REGISTRY:-agience}/agience-init:${VERSION:-edge}
    container_name: edge-init
    volumes:
      - ./.data:/data

  # ── Data layer ───────────────────────────────────────────────────────

  graph:
    image: arangodb:3.11
    container_name: edge-graph
    restart: unless-stopped
    environment:
      - ARANGO_NO_AUTH=0
    entrypoint: ["/bin/sh", "-c", "export ARANGO_ROOT_PASSWORD=$(cat /run/keys/arango.pass) && exec /entrypoint.sh arangod"]
    volumes:
      - ./.data/arangodb:/var/lib/arangodb3
      - ./.data/arangodb-apps:/var/lib/arangodb3-apps
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "(command -v wget >/dev/null && wget -qO- http://127.0.0.1:8529/_admin/server/availability >/dev/null) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  sql:
    image: postgres:15
    container_name: edge-sql
    restart: unless-stopped
    environment:
      PGPORT: 5432
      POSTGRES_USER: agience
      POSTGRES_PASSWORD_FILE: /run/keys/postgres.pass
      POSTGRES_DB: agience
    volumes:
      - ./.data/keys:/run/keys:ro
      - ./.data/postgresdb:/var/lib/postgresql/data
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d agience -U agience"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  search:
    image: opensearchproject/opensearch:latest
    container_name: edge-search
    restart: unless-stopped
    environment:
      - cluster.name=agience-search
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_PERFORMANCE_ANALYZER_ENABLED=false
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - plugins.security.disabled=false
      - bootstrap.memory_lock=false
    entrypoint: ["/bin/sh", "-c", "export OPENSEARCH_INITIAL_ADMIN_PASSWORD=$(cat /run/keys/opensearch.pass) && exec /usr/share/opensearch/opensearch-docker-entrypoint.sh"]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./.data/opensearch:/usr/share/opensearch/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL",
            "curl -sk -u \"admin:$(cat /run/keys/opensearch.pass)\" https://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  # ── Content storage (MinIO) ──────────────────────────────────────────

  content:
    image: minio/minio:latest
    container_name: edge-content
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=agience
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=$(cat /run/keys/minio.pass) && exec /usr/bin/docker-entrypoint.sh server /data --console-address :9001"]
    volumes:
      - ./.data/minio:/data
      - ./.data/keys:/run/keys:ro
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Platform services ────────────────────────────────────────────────

  backend:
    image: ${REGISTRY:-agience}/agience-backend:${VERSION:-edge}
    pull_policy: always
    container_name: edge-backend
    restart: unless-stopped
    environment:
      - BUILD_INFO_PATH=/app/build_info.json
      - POSTGRES_DB_HOST=sql
      - ARANGO_HOST=graph
      - OPENSEARCH_HOST=search
      - AGIENCE_SERVER_HOST_URI=http://servers:8082
      - MINIO_ROOT_USER=agience
      - KEYS_DIR=/app/.data/keys
    volumes:
      - ./.data/keys:/app/.data/keys:ro
    depends_on:
      content:
        condition: service_healthy
      sql:
        condition: service_healthy
      graph:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/version', timeout=2).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  servers:
    image: ${REGISTRY:-agience}/agience-servers:${VERSION:-edge}
    pull_policy: always
    container_name: edge-servers
    restart: unless-stopped
    environment:
      - AGIENCE_API_URI=http://backend:8081
      - SRS_HTTP_API=http://stream:1985
      - STREAM_BASE_URL=http://stream:1985/live
      - STREAM_INGEST_URL=rtmp://localhost:1936/live
    volumes:
      - ./.data/stream:/var/stream
    depends_on:
      backend: { condition: service_healthy }

  stream:
    image: ${REGISTRY:-agience}/agience-stream:${VERSION:-edge}
    pull_policy: always
    container_name: edge-stream
    restart: unless-stopped
    environment:
      - BACKEND_URI=http://servers:8082/astra
    volumes:
      - ./.data/stream:/var/stream
    ports:
      - "1936:1936"

  frontend:
    image: ${REGISTRY:-agience}/agience-frontend:${VERSION:-edge}
    pull_policy: always
    container_name: edge-frontend
    restart: unless-stopped

  # ── Router — Caddy with TLS cert fetched from CDN at startup ─────────

  caddy:
    image: ghcr.io/agience/agience-home:stable
    pull_policy: always
    container_name: edge-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./.data/keys:/run/keys
    depends_on:
      init:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started
      content:
        condition: service_started
      stream:
        condition: service_started
